version: "3.9"

services:

  database:
    build: ./database
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: dhairya
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - mynet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydb"]
      interval: 10s
      retries: 5

  backend:
    build: ./backend
    container_name: node_backend
    ports:
    - "3000:3000"  
    restart: always
    environment:
      DB_HOST: postgres_db   
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: dhairya
    depends_on:
      database:
        condition: service_healthy
    networks:
      - mynet

volumes:
  pgdata:

networks:
  mynet:
    driver: bridge